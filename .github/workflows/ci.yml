name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  node-version: 18.x

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.node-version }}
          cache: yarn
      - run: yarn install --frozen-lockfile
      - name: Run Linter
        run: yarn lint
      - name: Check Formatting
        run: yarn format:check
      - name: Run Type Check
        run: yarn flow

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.node-version }}
          cache: yarn
      - run: yarn install --frozen-lockfile
      - name: Run Tests with Coverage
        run: yarn test:ci
      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage/lcov.info
          fail_ci_if_error: false

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.node-version }}
          cache: yarn
      - run: yarn install --frozen-lockfile
      - name: Verify App Bundle
        run: yarn build:ci
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v3
        with:
          name: app-bundle
          path: /tmp/aniversario-bundle.js

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.node-version }}
          cache: yarn
      - run: yarn install --frozen-lockfile
      - name: Deploy to Expo
        env:
          EXPO_CLI_USERNAME: ${{ secrets.EXPO_CLI_USERNAME }}
          EXPO_CLI_PASSWORD: ${{ secrets.EXPO_CLI_PASSWORD }}
        run: npx expo publish --non-interactive
      - name: Health Check
        run: |
          echo "Deployment complete. App available at:"
          echo "https://expo.io/@${{ secrets.EXPO_CLI_USERNAME }}/aniversario-app"
